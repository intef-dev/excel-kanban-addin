<div>
  <!-- Sección superior para mostrar botón de actualización -->
  <button id="btnRefresh">Actualizar desde Excel</button>

  <!-- Cuerpo del elemento Kanban -->
  <div class="kanban">
    <!-- Contenerdor de columna para 'NUEVOS' -->
    <div class="column">
      <!-- Encabezado y conteo -->
      <div class="column-header">
        <h3>Nuevos</h3>
        <span class="badge" id="count-nuevo">0</span>
      </div>
      <!-- Contenedor para las tarjetas -->
      <div class="cards" id="Nuevo"></div>
    </div>

    <!-- Contenerdor de columna para 'CONTACTADOS' -->
    <div class="column">
      <!-- Encabezado y conteo -->
      <div class="column-header">
        <h3>Contactados</h3>
        <span class="badge" id="count-contactado">0</span>
      </div>
      <!-- Contenedor para las tarjetas -->
      <div class="cards" id="Contactado"></div>
    </div>

    <!-- Contenerdor de columna para 'PROPUESTA' -->
    <div class="column">
      <!-- Encabezado y conteo -->
      <div class="column-header">
        <h3>Propuesta</h3>
        <span class="badge" id="count-propuesta">0</span>
      </div>
      <!-- Contenedor para las tarjetas -->
      <div class="cards" id="Propuesta"></div>
    </div>

    <!-- Contenerdor de columna para 'CERRADOS' -->
    <div class="column">
      <!-- Encabezado y conteo -->
      <div class="column-header">
        <h3>Cerrados</h3>
        <span class="badge" id="count-cerrado">0</span>
      </div>
      <!-- Contenedor para las tarjetas -->
      <div class="cards" id="Cerrado"></div>
    </div>
  </div>
</div>
